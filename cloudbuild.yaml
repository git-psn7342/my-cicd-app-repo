steps:
  - name: 'node:18'
    id: 'install'
    entrypoint: 'npm'
    args: ['install']

  - name: 'node:18'
    id: 'lint'
    entrypoint: 'npm'
    args: ['run', 'lint']
    waitFor: ['install']

  - name: 'node:18'
    id: 'test'
    entrypoint: 'npm'
    args: ['test']
    waitFor: ['install']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/able-folio-490803-g2/my-app/app:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/able-folio-490803-g2/my-app/app:latest'
      - '.'
    waitFor: ['lint', 'test']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/able-folio-490803-g2/my-app/app'
    waitFor: ['build']

options:
  logging: CLOUD_LOGGING_ONLY
