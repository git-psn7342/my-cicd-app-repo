steps:
  - name: 'node:18'
    id: 'install'
    entrypoint: 'npm'
    args: ['install']

  - name: 'node:18'
    id: 'lint'
    entrypoint: 'npm'
    args: ['run', 'lint']
    waitFor: ['install']

  - name: 'node:18'
    id: 'test'
    entrypoint: 'npm'
    args: ['test']
    waitFor: ['install']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/my-app/app:$SHORT_SHA', '.']
    waitFor: ['lint', 'test']

options:
  logging: CLOUD_LOGGING_ONLY
